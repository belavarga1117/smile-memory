[build]
builder = "nixpacks"
buildCommand = "rm -rf node_modules package-lock.json && npm install && npm run css:build && pip install -r requirements/production.txt && python manage.py collectstatic --noinput && python manage.py migrate"

[deploy]
startCommand = "gunicorn config.wsgi --bind 0.0.0.0:$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
