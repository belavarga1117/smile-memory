services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smile_memory
      POSTGRES_USER: travel
      POSTGRES_PASSWORD: travel_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
