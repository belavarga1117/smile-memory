name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: smile_memory_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: test-secret-key-for-ci-pipeline-minimum-fifty-characters-long-enough
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/smile_memory_test

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/base.txt
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/development.txt
      - name: Django system check
        run: python manage.py check
      - name: Run migrations
        run: python manage.py migrate
      - name: Check no unmigrated changes
        run: python manage.py makemigrations --check --dry-run
      - name: Run tests with coverage
        run: pytest --cov=apps --cov-report=term-missing --cov-report=html -v
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: htmlcov/

  deploy-check:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: smile_memory_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: ci-fake-production-secret-key-minimum-fifty-characters-aabbccdd
      ALLOWED_HOSTS: smilememorytravel.com
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/smile_memory_test
      REDIS_URL: redis://localhost:6379/0
      BREVO_API_KEY: fake-brevo-key-for-deploy-check
      SITE_NAME: Smile Memory
      ADMIN_EMAIL: admin@smilememorytravel.com

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/base.txt
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/production.txt
      - name: Production settings check
        run: python manage.py check --deploy
