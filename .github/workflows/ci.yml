name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DJANGO_SETTINGS_MODULE: config.settings.development
  SECRET_KEY: test-secret-key-for-ci-pipeline-minimum-fifty-characters-long-enough
  DEBUG: "True"
  ALLOWED_HOSTS: "*"
  DATABASE_URL: "sqlite:///db.sqlite3"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements/base.txt
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/development.txt
      - name: Django system check
        run: python manage.py check
      - name: Run migrations
        run: python manage.py migrate
      - name: Check no unmigrated changes
        run: python manage.py makemigrations --check --dry-run
      - name: Run tests with coverage
        run: pytest --cov=apps --cov-report=term-missing --cov-report=html -v
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
