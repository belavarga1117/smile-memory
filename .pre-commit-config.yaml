# Pre-commit hooks — run automatically before every git commit.
# Install once: pip install pre-commit && pre-commit install
# Run manually on all files: pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
