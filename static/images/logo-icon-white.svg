<!-- Smile Memory — brand icon, white version (for dark backgrounds) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="glow-w" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.85"/>
    </radialGradient>
  </defs>

  <!-- Globe lines -->
  <circle cx="100" cy="118" r="76" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <ellipse cx="100" cy="118" rx="76" ry="26" stroke="white" stroke-width="1" opacity="0.25"/>
  <ellipse cx="100" cy="118" rx="76" ry="54" stroke="white" stroke-width="0.8" opacity="0.16"/>
  <line x1="100" y1="42" x2="100" y2="194" stroke="white" stroke-width="1" opacity="0.2"/>
  <line x1="24" y1="118" x2="176" y2="118" stroke="white" stroke-width="0.8" opacity="0.16"/>

  <!-- Face circle -->
  <circle cx="100" cy="118" r="58" fill="white" opacity="0.92" stroke="white" stroke-width="1"/>

  <!-- Rosy cheeks (very subtle on white) -->
  <ellipse cx="73" cy="126" rx="11" ry="8" fill="white" opacity="0.35"/>
  <ellipse cx="127" cy="126" rx="11" ry="8" fill="white" opacity="0.35"/>

  <!-- Eyes (semi-transparent on white face) -->
  <circle cx="84" cy="111" r="5.5" fill="white" opacity="0.4"/>
  <circle cx="116" cy="111" r="5.5" fill="white" opacity="0.4"/>

  <!-- Smile -->
  <path d="M 79 128 Q 100 148 121 128" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <!-- Crown base band -->
  <rect x="55" y="74" width="90" height="8" rx="4" fill="white" opacity="0.75"/>

  <!-- Crown body -->
  <path d="M 55 79 L 63 50 L 79 67 L 100 34 L 121 67 L 137 50 L 145 79 Z" fill="white" opacity="0.88"/>

  <!-- Crown jewels -->
  <circle cx="63" cy="49" r="5.5" fill="white" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <circle cx="63" cy="49" r="2.8" fill="white" opacity="0.85"/>
  <circle cx="100" cy="33" r="6.5" fill="white" stroke="white" stroke-width="1.4" opacity="0.6"/>
  <circle cx="100" cy="33" r="3.2" fill="white" opacity="0.85"/>
  <circle cx="137" cy="49" r="5.5" fill="white" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <circle cx="137" cy="49" r="2.8" fill="white" opacity="0.85"/>

  <!-- Crown inner jewels -->
  <circle cx="79" cy="66" r="3.8" fill="white" stroke="white" stroke-width="0.9" opacity="0.5"/>
  <circle cx="121" cy="66" r="3.8" fill="white" stroke="white" stroke-width="0.9" opacity="0.5"/>
</svg>
