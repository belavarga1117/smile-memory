<!-- Smile Memory — brand icon, rose gold luxury palette -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Face: champagne-blush to petal pink -->
    <radialGradient id="fg" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFF0F6"/>
      <stop offset="50%" stop-color="#FAD6E8"/>
      <stop offset="100%" stop-color="#F0A0C4"/>
    </radialGradient>
    <!-- Crown: warm peach-gold to deep rose -->
    <linearGradient id="cg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F4C090"/>
      <stop offset="100%" stop-color="#BC4478"/>
    </linearGradient>
    <!-- Crown shine -->
    <linearGradient id="cshine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0.32"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Face highlight glow -->
    <radialGradient id="glow" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Globe lines (travel element, rose gold tones) -->
  <circle cx="100" cy="118" r="76" stroke="#EAB8D0" stroke-width="1.2" opacity="0.45"/>
  <ellipse cx="100" cy="118" rx="76" ry="26" stroke="#EAB8D0" stroke-width="1" opacity="0.38"/>
  <ellipse cx="100" cy="118" rx="76" ry="54" stroke="#EAB8D0" stroke-width="0.8" opacity="0.24"/>
  <line x1="100" y1="42" x2="100" y2="194" stroke="#EAB8D0" stroke-width="1" opacity="0.3"/>
  <line x1="24" y1="118" x2="176" y2="118" stroke="#EAB8D0" stroke-width="0.8" opacity="0.22"/>

  <!-- Face -->
  <circle cx="100" cy="118" r="58" fill="url(#fg)" stroke="#F0A0C4" stroke-width="1.8"/>
  <circle cx="100" cy="118" r="58" fill="url(#glow)"/>

  <!-- Cheeks — soft rose blush -->
  <ellipse cx="73" cy="126" rx="11" ry="7.5" fill="#D85C94" opacity="0.14"/>
  <ellipse cx="127" cy="126" rx="11" ry="7.5" fill="#D85C94" opacity="0.14"/>

  <!-- Eyes -->
  <circle cx="84" cy="111" r="5.5" fill="#2A0820"/>
  <circle cx="116" cy="111" r="5.5" fill="#2A0820"/>
  <circle cx="86.2" cy="109" r="1.8" fill="white" opacity="0.7"/>
  <circle cx="118.2" cy="109" r="1.8" fill="white" opacity="0.7"/>

  <!-- Smile -->
  <path d="M 79 128 Q 100 148 121 128" stroke="#2A0820" stroke-width="3" stroke-linecap="round"/>

  <!-- Crown base band -->
  <rect x="55" y="74" width="90" height="8" rx="4" fill="#BC4478"/>

  <!-- Crown body (peach-gold to deep rose) -->
  <path d="M 55 79 L 63 50 L 79 67 L 100 34 L 121 67 L 137 50 L 145 79 Z" fill="url(#cg)"/>
  <path d="M 55 79 L 63 50 L 79 67 L 100 34 L 121 67 L 137 50 L 145 79 Z" fill="url(#cshine)"/>

  <!-- Crown detail lines -->
  <line x1="79" y1="67" x2="79" y2="79" stroke="#BC4478" stroke-width="0.8" opacity="0.5"/>
  <line x1="121" y1="67" x2="121" y2="79" stroke="#BC4478" stroke-width="0.8" opacity="0.5"/>

  <!-- Crown top jewels — peach gold halo, rose center -->
  <circle cx="63" cy="49" r="5.5" fill="white" stroke="#E8AC80" stroke-width="1.4"/>
  <circle cx="63" cy="49" r="2.8" fill="#D85C94"/>
  <circle cx="100" cy="33" r="6.5" fill="white" stroke="#E8AC80" stroke-width="1.6"/>
  <circle cx="100" cy="33" r="3.2" fill="#D85C94"/>
  <circle cx="137" cy="49" r="5.5" fill="white" stroke="#E8AC80" stroke-width="1.4"/>
  <circle cx="137" cy="49" r="2.8" fill="#D85C94"/>

  <!-- Crown inner jewels -->
  <circle cx="79" cy="66" r="3.8" fill="white" stroke="#E8AC80" stroke-width="1" opacity="0.9"/>
  <circle cx="121" cy="66" r="3.8" fill="white" stroke="#E8AC80" stroke-width="1" opacity="0.9"/>
</svg>
